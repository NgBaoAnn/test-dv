name: Deploy to Server

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # Uncomment the following lines if you need to build your project (e.g. Node.js)
    # - name: Set up Node.js
    #   uses: actions/setup-node@v4
    #   with:
    #     node-version: '20.x'
    #     cache: 'npm'
    # - name: Install and Build
    #   run: |
    #     npm install
    #     npm run build --if-present

    - name: Deploy files via SCP
      uses: appleboy/scp-action@v0.1.4
      with:
        host: 152.42.202.85        # Add this secret in GitHub (e.g., 152.42.202.85)
        username: root  # Add this secret in GitHub (e.g., root)
        key: ${{ secrets.SERVER }}    # Add your private key in GitHub Secrets
        source: "."                           # If you build the project, change to e.g. "dist/*" or "build/*"
        target: "/var/www/html/"   # Change this to your actual deployment directory on the server
        strip_components: 0
